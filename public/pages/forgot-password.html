<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Forgot Password - ProjectMarket</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#200df2", "background-light": "#f6f5f8", "background-dark": "#111022" }, fontFamily: { "display": ["Inter"] }, borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"} } } }
    </script>
    <link rel="stylesheet" href="/styles/main.css" />
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 flex flex-col min-h-screen">
    <div id="navbar-container"></div>
    
    <div class="relative flex flex-col flex-grow items-center justify-center overflow-x-hidden w-full">
        <main class="flex flex-1 items-center justify-center px-4 py-12 w-full">
            <div class="w-full max-w-[480px] space-y-8 z-10">
                <!-- Icon and Title -->
                <div class="flex flex-col items-center text-center space-y-4">
                    <div class="flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary">
                        <span class="material-symbols-outlined text-3xl">lock_reset</span>
                    </div>
                    <div class="space-y-2">
                        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white sm:text-4xl">
                            Forgot password?
                        </h1>
                        <p class="text-slate-600 dark:text-slate-400 text-base max-w-sm mx-auto">
                            No worries, it happens. Enter the email address associated with your account and we'll send you a link to reset your password.
                        </p>
                    </div>
                </div>
                <!-- Reset Form -->
                <form class="space-y-6" onsubmit="event.preventDefault(); alert('Reset link sent! Please check your email.'); window.location.href='/pages/login.html';">
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                                <span class="material-symbols-outlined text-slate-400 text-lg">mail</span>
                            </div>
                            <input class="block w-full rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 py-4 pl-11 pr-4 text-slate-900 dark:text-white placeholder-slate-400 focus:border-primary focus:ring-primary/20 transition-all outline-none" id="email" type="email" placeholder="name@example.com" required/>
                        </div>
                    </div>
                    <div class="pt-2">
                        <button class="w-full flex items-center justify-center rounded-xl bg-primary px-6 py-4 text-base font-bold text-white shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all active:scale-[0.98]" type="submit">
                            Send Reset Link
                        </button>
                    </div>
                </form>
                <!-- Footer Links -->
                <div class="flex flex-col items-center space-y-4 pt-4">
                    <a class="flex items-center gap-2 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors" href="/pages/login.html">
                        <span class="material-symbols-outlined text-lg">arrow_back</span> Back to Login
                    </a>
                    <div class="text-xs text-slate-500 dark:text-slate-600">
                        Don't have an account? <a class="text-primary hover:underline font-bold" href="/pages/register.html">Sign up</a>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Optional Decorative Element -->
        <div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
    </div>
    
    <div id="footer-container"></div>
    <script src="/scripts/theme.js"></script>
    <script src="/scripts/cart.js"></script>
    <script src="/scripts/main.js"></script>
</body>
</html>

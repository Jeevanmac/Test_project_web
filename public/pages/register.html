<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Register | ProjectMarket</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#200df2", "background-light": "#f6f5f8", "background-dark": "#111022" }, fontFamily: { "display": ["Inter"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }
    </script>
    <link rel="stylesheet" href="/styles/main.css" />
    <style>
        .glass-panel { background: rgba(27, 24, 52, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(54, 49, 104, 0.5); }
        .bg-mesh { background-image: radial-gradient(at 0% 0%, rgba(32, 13, 242, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(32, 13, 242, 0.1) 0px, transparent 50%); }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col bg-mesh">
    
    <div id="navbar-container" class="relative z-50"></div>

    <main class="flex-grow flex items-center justify-center p-4 pt-24 pb-12 relative z-10 w-full">
        <div class="relative w-full max-w-[1100px] grid lg:grid-cols-2 overflow-hidden rounded-xl shadow-2xl glass-panel">
            <div class="hidden lg:flex flex-col justify-between p-12 bg-primary/10 relative overflow-hidden">
                <div class="absolute inset-0 z-0 opacity-40">
                    <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-primary/30 rounded-full blur-[100px]"></div>
                    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/20 rounded-full blur-[80px]"></div>
                </div>
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-12">
                        <div class="p-2 bg-primary rounded-lg text-white">
                            <span class="material-symbols-outlined">rocket_launch</span>
                        </div>
                        <h1 class="text-xl font-bold tracking-tight">ProjectMarket</h1>
                    </div>
                    <div class="space-y-6">
                        <h2 class="text-4xl font-extrabold leading-tight">Start your journey into the <span class="text-primary">future</span> of digital management.</h2>
                        <p class="text-slate-400 text-lg">Access our high-performance assets, real-time templates, and premium community tools.</p>
                    </div>
                </div>
            </div>
            <div class="p-8 lg:p-16 flex flex-col justify-center bg-white/5 dark:bg-transparent">
                <header class="mb-10">
                    <h2 class="text-3xl font-bold mb-2">Create Account</h2>
                    <p class="text-slate-400">Already have an account? <a class="text-primary hover:underline font-medium" href="/pages/login.html">Sign in here</a></p>
                </header>
                <script>
        async function handleRegister(event) {
            event.preventDefault();
            const name = event.target.querySelector('input[placeholder="John Doe"]').value;
            const email = event.target.querySelector('input[type="email"]').value;
            const password = event.target.querySelector('input[type="password"]').value;

            try {
                const res = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/pages/dashboard.html';
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (err) {
                alert('Server error. Please try again.');
            }
        }
    </script>
                <form class="space-y-5" onsubmit="handleRegister(event)">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">Full Name</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">person</span>
                            <input class="w-full pl-12 pr-4 py-4 bg-background-dark/50 border border-slate-700/50 rounded-lg focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-600" placeholder="John Doe" type="text" required/>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">Email Address</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">mail</span>
                            <input class="w-full pl-12 pr-4 py-4 bg-background-dark/50 border border-slate-700/50 rounded-lg focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-600" placeholder="john@company.com" type="email" required/>
                        </div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-300 ml-1">Password</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">lock</span>
                                <input class="w-full pl-12 pr-4 py-4 bg-background-dark/50 border border-slate-700/50 rounded-lg focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-600" placeholder="••••••••" type="password" required/>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-300 ml-1">Confirm Password</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">lock_reset</span>
                                <input class="w-full pl-12 pr-4 py-4 bg-background-dark/50 border border-slate-700/50 rounded-lg focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-600" placeholder="••••••••" type="password" required/>
                            </div>
                        </div>
                    </div>
                    <button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg flex items-center justify-center gap-2 group mt-4 hover:-translate-y-1" type="submit">
                        <span>Create Free Account</span>
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-container" class="relative z-50"></div>
    <script src="/scripts/theme.js"></script>
    <script src="/scripts/cart.js"></script>
    <script src="/scripts/main.js"></script>
</body>
</html>

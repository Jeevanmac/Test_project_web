<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | ProjectMarket</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#200df2", "background-light": "#f6f5f8", "background-dark": "#111022" }, fontFamily: { "display": ["Inter", "sans-serif"] }, borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"} } } }
    </script>
    <link rel="stylesheet" href="/styles/main.css" />
    <style>
        .glass-panel { background: rgba(27, 24, 52, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(54, 49, 104, 0.5); }
        .glow-effect { box-shadow: 0 0 20px rgba(32, 13, 242, 0.15); }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col relative">
    <div id="navbar-container" class="relative z-50"></div>

    <main class="flex-grow flex flex-col items-center pt-24 pb-12 relative w-full">
        <!-- Background Decor -->
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
        
        <div class="relative w-full max-w-[480px] px-6 z-10">
            <div class="flex flex-col items-center mb-10">
                <div class="size-12 bg-primary rounded-xl flex items-center justify-center mb-4 glow-effect text-white">
                    <span class="material-symbols-outlined">rocket_launch</span>
                </div>
                <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">ProjectMarket</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Access your digital innovation hub</p>
            </div>
            
            <div class="glass-panel rounded-2xl p-8 glow-effect shadow-2xl">
                <!-- Form -->
                <script>
        async function handleLogin(event) {
            event.preventDefault();
            const email = event.target.querySelector('input[type="email"]').value;
            const password = event.target.querySelector('input[type="password"]').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    if (data.user && data.user.email === 'admin@projectmarket.com') {
                        data.user.isAdmin = true;
                    }
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/pages/dashboard.html';
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (err) {
                alert('Server error. Please try again.');
            }
        }
    </script>
                <form class="space-y-5" onsubmit="handleLogin(event)">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2 ml-1">Email Address</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
                            <input class="block w-full pl-12 pr-4 py-3.5 bg-background-dark/50 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" placeholder="name@company.com" type="email" required/>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2 ml-1">
                            <label class="block text-sm font-medium text-slate-400">Password</label>
                            <a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="/pages/forgot-password.html">Forgot password?</a>
                        </div>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
                            <input class="block w-full pl-12 pr-12 py-3.5 bg-background-dark/50 border border-white/10 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" placeholder="••••••••" type="password" required/>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input class="h-4 w-4 rounded border-white/10 bg-background-dark/50 text-primary focus:ring-primary focus:ring-offset-background-dark" id="remember-me" type="checkbox"/>
                        <label class="ml-2 block text-sm text-slate-400" for="remember-me">Remember my session</label>
                    </div>
                    <button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all duration-300 transform active:scale-[0.98]" type="submit">Sign In</button>
                </form>

                <div class="mt-8 pt-6 border-t border-white/5">
                    <p class="text-center text-slate-500 text-xs mb-4 uppercase tracking-widest font-bold">New to ProjectMarket?</p>
                    <a href="/pages/register.html" class="w-full py-4 bg-white/5 hover:bg-white/10 text-white font-bold rounded-xl border border-white/10 flex items-center justify-center transition-all duration-300">
                        Create New Account
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container" class="relative z-50"></div>
    <script src="/scripts/theme.js"></script>
    <script src="/scripts/cart.js"></script>
    <script src="/scripts/main.js"></script>
</body>
</html>

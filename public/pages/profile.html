<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile | ProjectMarket</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#200df2", "background-light": "#f6f5f8", "background-dark": "#111022" }, fontFamily: { "display": ["Inter"] } } } }
    </script>
    <link rel="stylesheet" href="/styles/main.css" />
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">

    <!-- Global Top Nav -->
    <div id="navbar-container" class="sticky top-0 z-50 shadow-sm w-full"></div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 w-full max-w-md text-center">
            
            <div class="size-24 bg-primary/20 text-primary mx-auto rounded-full flex items-center justify-center mb-6 border border-primary/30">
                <span class="material-symbols-outlined text-4xl">account_circle</span>
            </div>

            <div id="profile-view">
                <h1 id="profile-name" class="text-3xl font-black tracking-tight mb-2">User Name</h1>
                <p id="profile-email" class="text-slate-500 font-medium mb-8">user@example.com</p>

                <div class="flex flex-col gap-4">
                    <button onclick="toggleEditMode()" class="w-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">edit</span> Edit Profile
                    </button>
                    <button onclick="window.location.href='/pages/dashboard.html'" class="w-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">dashboard</span> Go to Dashboard
                    </button>
                    <button onclick="logout()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-red-500/20 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">logout</span> Log Out
                    </button>
                </div>
            </div>

            <form id="profile-edit" class="hidden flex-col gap-4 text-left" onsubmit="saveProfile(event)">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Full Name</label>
                    <input type="text" id="edit-name" required class="w-full bg-slate-50 dark:bg-slate-900 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary outline-none transition-all">
                </div>
                <div class="flex gap-4 mt-4">
                    <button type="button" onclick="toggleEditMode()" class="w-1/2 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-white font-bold py-3 rounded-xl hover:bg-slate-300 transition-all">Cancel</button>
                    <button type="submit" class="w-1/2 bg-primary text-white font-bold py-3 rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/20">Save</button>
                </div>
            </form>
            
        </div>
    </main>

    <!-- Global Footer -->
    <div id="footer-container" class="w-full mt-auto"></div>

    <script src="/scripts/theme.js"></script>
    <script src="/scripts/cart.js"></script>
    <script src="/scripts/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = '/pages/login.html';
                return;
            }
            document.getElementById('profile-name').innerText = user.name || 'User';
            document.getElementById('profile-email').innerText = user.email || '';
        });

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/pages/index.html';
        }

        function toggleEditMode() {
            const view = document.getElementById('profile-view');
            const edit = document.getElementById('profile-edit');
            if (view.classList.contains('hidden')) {
                view.classList.remove('hidden');
                edit.classList.add('hidden');
                edit.classList.remove('flex');
            } else {
                view.classList.add('hidden');
                edit.classList.remove('hidden');
                edit.classList.add('flex');
                
                const user = JSON.parse(localStorage.getItem('user'));
                document.getElementById('edit-name').value = user.name || '';
            }
        }

        function saveProfile(e) {
            e.preventDefault();
            const newName = document.getElementById('edit-name').value;
            const user = JSON.parse(localStorage.getItem('user'));
            user.name = newName;
            localStorage.setItem('user', JSON.stringify(user));
            
            document.getElementById('profile-name').innerText = newName;
            toggleEditMode();
            
            // Reload page to visually update navbar global state
            window.location.reload();
        }
    </script>
</body>
</html>
